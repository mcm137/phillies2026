<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phillies 2026 Ticket Tracker</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#1a1a2e;padding:20px}
  .header{text-align:center;padding:24px;background:linear-gradient(135deg,#1F4E79,#E81828);border-radius:12px;margin-bottom:24px}
  .header h1{color:white;font-size:28px;margin-bottom:4px}
  .header p{color:rgba(255,255,255,0.85);font-size:14px}
  .summary-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
  .card{background:white;border-radius:10px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
  .card .label{font-size:11px;text-transform:uppercase;color:#666;letter-spacing:0.5px;margin-bottom:4px}
  .card .value{font-size:24px;font-weight:700;color:#1F4E79}
  .card .value.pos{color:#2e7d32} .card .value.neg{color:#c62828}
  .tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .tab{padding:10px 18px;border:none;background:white;border-radius:8px 8px 0 0;cursor:pointer;font-size:13px;font-weight:600;color:#666;transition:all 0.2s}
  .tab.active{background:#1F4E79;color:white}
  .table-wrap{background:white;border-radius:0 10px 10px 10px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.08);overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{background:#1F4E79;color:white;padding:8px 6px;text-align:center;white-space:nowrap;position:sticky;top:0}
  td{padding:6px;text-align:center;border-bottom:1px solid #e8e8e8}
  tr:hover td{background:#f5f8fc !important}
  tr.sold td{background:#e8f5e9} tr.act td{background:#fff8e1} tr.inact td{background:#ffebee} tr.nl td{background:#fafafa}
  .badge{font-weight:600;padding:2px 6px;border-radius:3px;font-size:10px;white-space:nowrap}
  .badge.s{background:#c8e6c9;color:#2e7d32} .badge.a{background:#fff9c4;color:#e65100}
  .badge.i{background:#ffcdd2;color:#c62828} .badge.n{background:#e0e0e0;color:#616161}
  .btn{margin-top:16px;padding:10px 18px;background:#1F4E79;color:white;border:none;border-radius:6px;cursor:pointer;font-size:13px;margin-right:8px}
  .btn:hover{background:#163d5e}
  .totals td{font-weight:700;background:#e8f0fe !important;border-top:2px solid #1F4E79}
  .legend{margin-top:14px;display:flex;gap:14px;font-size:11px;flex-wrap:wrap}
  .legend-item{display:flex;align-items:center;gap:4px}
  .sw{width:12px;height:12px;border-radius:2px}
  .filter-bar{margin-bottom:14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .filter-bar select{padding:6px 10px;border:1px solid #ccc;border-radius:4px;font-size:12px}
  .filter-bar label{font-size:12px;font-weight:600;color:#555}
</style>
</head>

</div>

<div class="filter-bar">

  <select id="statusFilter" onchange="render()">

    <option value="SOLD">Sold</option>
    <option value="ACTIVE">Active</option>
    <option value="NOT LISTED">Not Listed</option>

  <select id="monthFilter" onchange="render()">

    <option value="Mar">March</option><option value="Apr">April</option><option value="May">May</option>
    <option value="Jun">June</option><option value="Jul">July</option><option value="Aug">August</option><option value="Sep">September</option>
  </select>
</div>
<div class="table-wrap" id="tbl"></div>
<div><button class="btn" onclick="exportCSV()">Export CSV</button></div>
<div class="legend">

  <div class="legend-item"><div class="sw" style="background:#fff9c4"></div>Active</div>

const $=id=>document.getElementById(id);
const fmt=n=>n!=null&&!isNaN(n)?'$'+n.toFixed(2).replace(/\d(?=(\d{3})+\.)/g,'$&,'):'--';
function totals(g){let tc=0,tp=0,tss=0,ts=0;g.forEach(x=>{ts+=x.s;tc+=x.s*C;if(x.po)tp+=x.po;if(x.ss)tss+=x.ss});return{tc,tp,tss,ts,net:tp-tc}}

function rc(s){return s==='SOLD'?'sold':s==='ACTIVE'?'act':s==='INACTIVE'?'inact':'nl'}
function filtered(games){
  const sf=$('statusFilter').value,mf=$('monthFilter').value;
  return games.filter(g=>(sf==='all'||g.st===sf)&&(mf==='all'||g.d.includes(mf)));
}
function tbl(games){
  const fg=filtered(games);
  let h='<table><tr><th>#</th><th>Date</th><th>Time</th><th>Opponent</th><th>Seats</th><th>Cost/Seat</th><th>Total Cost</th><th>List/Sale $</th><th>Payout/Tk</th><th>Sold</th><th>Total Payout</th><th>Net P/L</th><th>MM</th><th>Status</th><th>Notes</th></tr>';
  let tt=totals(fg);
  fg.forEach(g=>{

    const mm=net!=null?net/2:null;

function combined(){

    '<tr><td>Sold</td><td>'+sm+'</td><td>'+sd+'</td><td>'+(sm+sd)+'</td></tr>'+

}
function cards(){
  const m=totals(edkraus),d=totals(dave);
  const c={tc:m.tc+d.tc,tp:m.tp+d.tp,tss:m.tss+d.tss,ts:m.ts+d.ts,net:m.net+d.net};

  const ac=edkraus.filter(g=>g.st==='ACTIVE').length+dave.filter(g=>g.st==='ACTIVE').length;
  $('cards').innerHTML=
    '<div class="card"><div class="label">Total Games</div><div class="value">'+(edkraus.length+dave.length)+'</div></div>'+
    '<div class="card"><div class="label">Sold</div><div class="value pos">'+sc+'</div></div>'+
    '<div class="card"><div class="label">Active</div><div class="value">'+ac+'</div></div>'+
    '<div class="card"><div class="label">Cost Basis</div><div class="value">'+fmt(c.tc)+'</div></div>'+
    '<div class="card"><div class="label">Payouts</div><div class="value">'+fmt(c.tp)+'</div></div>'+
    '<div class="card"><div class="label">Net P/L</div><div class="value '+(c.net>=0?'pos':'neg')+'">'+fmt(c.net)+'</div></div>'+
    '<div class="card"><div class="label">Seats Sold</div><div class="value">'+c.tss+' / '+c.ts+'</div></div>';
}
function showTab(t,el){tab=t;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));el.classList.add('active');render()}
function render(){

  else if(tab==='dave')c.innerHTML=tbl(dave);
  else c.innerHTML=combined();
  cards();
}
function exportCSV(){
  const games=tab==='edkraus'?edkraus:tab==='dave'?dave:[...edkraus,...dave];
  let csv='ID,Date,Time,Opponent,Seats,Cost/Seat,Total Cost,List/Sale $,Payout/Tk,Seats Sold,Total Payout,Net,MM,Status,Notes\n';
  games.forEach(g=>{const tc=g.s*C;const net=g.po?g.po-tc:'';const mm=net!==''?(net/2).toFixed(2):'';
    csv+=[g.id,g.d,g.t,'"'+g.o+'"',g.s,C,tc,g.lp||'',g.sp||'',g.ss||0,g.po||'',net,mm,g.st,'"'+g.n+'"'].join(',')+'\n';});
  const b=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='phillies_'+tab+'_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}
$('tabBar').innerHTML='<button class="tab active" onclick="showTab(\'edkraus\',this)">Ed Kraus ('+edkraus.length+')</button><button class="tab" onclick="showTab(\'dave\',this)">Dave Amaro ('+dave.length+')</button><button class="tab" onclick="showTab(\'combined\',this)">Combined</button>';
render();
</script>
